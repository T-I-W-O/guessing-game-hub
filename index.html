<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game in HTML CSS & JavaScript</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="wrapper">
        <div class="game-selector">
            <button class="toggle-btn active" onclick="switchGame('number')">Numbers</button>
            <button class="toggle-btn" onclick="switchGame('word')">Words</button>
        </div>

        <header>
            <h1 id="gameTitle">Guess the Number</h1>
            <p id="gameSub" class="sub-header">Pick a number between 1 and 100</p>
        </header>

        <!-- Number Guessing Section -->
        <div id="numberSection" class="game-section active">
            <p id="numFeedback" class="feedback"></p>
            <div class="number-input-group">
                <input type="number" id="numInput" placeholder="00" min="1" max="100">
                <button id="numBtn" class="action-btn">Check Guess</button>
            </div>
            <p class="stats-footer">Chances left: <span class="highlight" id="numChances">10</span></p>
        </div>

        <!-- Word Guessing Section -->
        <div id="wordSection" class="game-section">
            <div class="difficulty-selector">
                <button class="diff-btn active" onclick="setDifficulty('easy')">Easy</button>
                <button class="diff-btn" onclick="setDifficulty('hard')">Hard</button>
            </div>
            <p id="wordFeedback" class="feedback"></p>
            <div class="word-content">
                <input type="text" class="typing-input" maxlength="1">
                <div class="inputs"></div>
                <div class="word-details">
                    <p>Hint: <span class="hint">Click "New Word" to start</span></p>
                    <p>Incorrect: <span class="wrong-letter"></span></p>
                </div>
                <button id="wordResetBtn" class="action-btn" style="margin-bottom: 15px;">New Word</button>
            </div>
            <p class="stats-footer">Guesses left: <span class="highlight" id="wordChances"></span></p>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
